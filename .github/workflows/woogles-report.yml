name: Woogles report email

# Fires at :05 and :35 past every hour from 13:05 to 23:35 UTC, i.e. 8:05am to
# 6:35pm Central Daylight Time — a first attempt at 8:05am, then a retry every
# 30 minutes until the report actually sends (generate_report_email.py skips
# re-sending once today's report has already gone out, and skips sending at
# all while every collection is still pending analysis). Central is UTC-5
# during CDT (Mar-Nov) and UTC-6 during CST (Nov-Mar), so this window runs an
# hour earlier — roughly 7:05am to 5:35pm — during CST.
on:
  schedule:
    - cron: "5,35 13-23 * * *"
  workflow_dispatch:
    inputs:
      target_username:
        description: "Woogles username to report on for a one-off send (leave blank for Jesse's daily report)"
        required: false
        default: ""
      recipient_email:
        description: "Email address to send a one-off report to (leave blank to use the default recipient)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch latest data snapshot and send-status marker from woogles-data branch
        if: ${{ github.event.inputs.target_username == '' }}
        run: |
          mkdir -p data
          git fetch origin woogles-data
          git show origin/woogles-data:data/woogles-snapshot.json > data/woogles-snapshot.json
          git show origin/woogles-data:data/last-report-sent.txt > data/last-report-sent.txt 2>/dev/null || echo "" > data/last-report-sent.txt

      - name: Fetch fresh snapshot for one-off target user
        if: ${{ github.event.inputs.target_username != '' }}
        run: python scripts/fetch_woogles_snapshot.py
        env:
          WOOGLES_API_KEY: ${{ secrets.WOOGLES_API_KEY }}
          TARGET_USERNAME: ${{ github.event.inputs.target_username }}

      - run: python scripts/generate_report_email.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TARGET_USERNAME: ${{ github.event.inputs.target_username }}
          RECIPIENT_EMAIL: ${{ github.event.inputs.recipient_email }}

      - name: Commit updated report state
        if: ${{ github.event.inputs.target_username == '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/report-state.json
          git diff --cached --quiet || git commit -m "Update report state ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push origin HEAD:master

      - name: Record send-status marker if a report was sent
        if: ${{ github.event.inputs.target_username == '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B woogles-data
          git add -f data/last-report-sent.txt
          git diff --cached --quiet && echo "No report sent this run — nothing to record." || (git commit -m "Record report sent ($(date -u +%Y-%m-%dT%H:%M:%SZ))" && git push --force origin woogles-data)
