name: Woogles report email

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch latest data snapshot from woogles-data branch
        run: |
          mkdir -p data
          git fetch origin woogles-data
          git show origin/woogles-data:data/woogles-snapshot.json > data/woogles-snapshot.json

      - run: python scripts/generate_report_email.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
